<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DISEÑO WEB</title>

<style>
*{
margin:0px;
padding:0px;
box-sizing:border-box;
}

body{
background: radial-gradient(circle, blue, cyan);
font-family:Arial,Helvetica,sans-serif;
}

.contenedor{
width:1000px;
height:300px;
position:relative;
margin:50px auto;
border:2px solid black;
background-color:black;
overflow:hidden;
}

.marco1,.marco2,.marco3,.marco4,.marco5{
width:200px;
height:300px;
position:absolute;
overflow:hidden;
border:2px solid rgb(76, 5, 255);
box-shadow:0px 0px 20px rgb(76, 5, 255);
}

.marco1 img,.marco2 img,.marco3 img,.marco4 img,.marco5 img{
width:100%;
height:100%;
object-fit:cover;
}


.marco1{
left:0px;
animation:marco1 5s forwards;
animation-delay:0.3s;

}


@keyframes marco1{
0%{
top:-600px;
transform: rotateY(180deg);
}
100%{
top:0px;
transform: rotateY(0deg);
}
}



.marco2{
left:200px;
animation:marco2 5s forwards;
animation-delay:0.6s;
}

@keyframes marco2{
0%{
top:600px;
transform: rotateY(-180deg);
}
100%{
top:0px;
transform: rotateY(0deg);
}
}


.marco3{
left:400px;
animation:marco3 5s forwards;
animation-delay:0.9s;
}

@keyframes marco3{
0%{
top:-600px;
transform: rotateY(180deg);
}
100%{
top:0px;
transform: rotateY(0deg);
}
}


.marco4{
left:600px;
animation:marco4 5s forwards;
animation-delay:1.2s;
}

@keyframes marco4{
0%{
top:600px;
transform: rotateY(-180deg);
}
100%{
top:0px;
transform: rotateY(0deg);
}
}


.marco5{
left:800px;
animation:marco5 5s forwards;
animation-delay:1.5s;
}

@keyframes marco5{
0%{
top:-600px;
transform: rotateY(180deg);
}
100%{
top:0px;
transform: rotateY(0deg);
}
}

.titulo{
text-align:center;
color:white;
font-size:35px;
font-weight:bold;
margin-top:20px;

}

.volver{
    display:block;
    margin-top:20px;
    color:blue;
    font-size:25px;
   
    
}


</style>
</head>

<body>

<div class="titulo">
 "TECNOLOGIAS WEB"

</div>
<div class="contenedor">

<div class="marco1">
<img src="img/html.jpg">
</div>

<div class="marco2">
<img src="img/css.jpg">
</div>

<div class="marco3">
<img src="img/javascript.jpg">
</div>

<div class="marco4">
<img src="img/php.jpg">
</div>

<div class="marco5">
<img src="img/bootstrap.jpg">
</div>
 
</div>

</body>
</html>
