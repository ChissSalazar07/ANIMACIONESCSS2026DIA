<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Efecto tipo Short</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:black;
}

/* CONTENEDOR */
.contenedor{
    position:relative;
    width:300px;
    height:500px;
    overflow:hidden;
}

/* FONDO BORROSO */
.fondo{
    position:absolute;
    width:100%;
    height:100%;
    background:url("img/cono.png") center/cover;
    filter: blur(20px);
    transform: scale(1.2);
}

/* VIDEO / IMAGEN PRINCIPAL */
.contenido{
    position:relative;
    width:100%;
    height:100%;
    background:url("img/helado1.png") center/contain no-repeat;
    animation: zoom 4s infinite alternate;
}

/* ANIMACIÓN */
@keyframes zoom{
    from{
        transform: scale(1);
    }
    to{
        transform: scale(1.1);
    }
}
</style>

</head>
<body>

<div class="contenedor">
    <div class="fondo"></div>
    <div class="contenido"></div>
</div>

</body>
</html>
