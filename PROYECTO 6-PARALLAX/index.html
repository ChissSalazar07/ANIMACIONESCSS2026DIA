<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Animación CSS6</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: url(img/fondo.jpg) no-repeat center center fixed;
            background-size: cover;
            text-align:center;
            color:white;
          
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

  
        h1{
            margin-top:30px;
            font-size:35px;
            text-shadow: 3px 3px 8px black;
             background-color: rgba(150, 236, 255, 0.7);
        }

       
        .menu{
            width:60%;
            margin:30px auto;
            max-width: 600px; 
        }

        
        .opcion{
            background: rgba(0, 200, 255, 0.7);
            margin:15px 0;
            padding:20px;
            border-radius:15px;
            transition: 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

      
       
      
        .opcion a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            display: block;
            width: 100%;
        }
      

    </style>
</head>
<body>

    <h1>Animación CSS6</h1>

    <div class="menu">
        
        <div class="opcion">
            <a href="video2.html">Video parallax2</a>
        </div>

        
       
        </div>
    <a href="../index.html" style="color:rgb(20, 50, 184);">Volver</a>

      
    </div>

</body>
</html>
