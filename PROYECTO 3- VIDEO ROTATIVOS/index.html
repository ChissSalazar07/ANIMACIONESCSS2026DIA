<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animación CSS3</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background: url(img/fondo.jpg);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    text-align:center;
    color:white;
}

/* TITULO */
h1{
    margin-top:30px;
    font-size:35px;
    text-shadow: 3px 3px 8px black;
}

/* CONTENEDOR */
.menu{
    width:60%;
    margin:30px auto;
}

/* CAJONES */
.opcion{
    background: rgba(0, 200, 255, 0.7);
    margin:15px 0;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}

/* HOVER */
.opcion:hover{
    transform: scale(1.05);
    background: rgba(0, 255, 255, 0.9);
}

/* LINKS */
a{
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>
